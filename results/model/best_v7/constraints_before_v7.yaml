# Hospital Department Layout Constraints Configuration
area_compatibility_tolerance: 0.15

adjacency_preferences:
  - depts: ["静配中心", "ICU"]
    weight: 1.0
  - depts: ["中心供应室", "内镜中心"]
    weight: 1.0
  - depts: ["采血处", "检验中心"]
    weight: 1.0

# Reward shaping parameters (optimized for stronger improvement signal)
invalid_action: -1.0  # Penalty for invalid actions
step_penalty: 0.0  # No step cost - encourage exploration
no_improvement_penalty: -0.05  # Reduced - allow trial and error
improvement_scale: 200.0  # Doubled - stronger improvement signal
terminal_bonus_scale: 200.0  # Doubled - emphasize final improvement
repetition_penalty: -0.1  # Keep same - discourage loops
exploration_bonus: 0.05  # Added - reward trying new swaps
early_termination_steps: 20  # Keep same