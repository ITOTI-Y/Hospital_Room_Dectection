# Global parameters
num_train_envs: 8
num_test_envs: 16

max_departments: 100
max_steps: 60  # Reduced from 100 to encourage efficient solutions

lr: 5e-5  # Further reduced to prevent policy collapse
lr_scheduler: "cosine"  # Options: "step", "cosine", "none"
lr_decay_step: 20  # Decay every N epochs (for step scheduler)
lr_decay_gamma: 0.5  # Decay factor (for step scheduler)
lr_min: 1e-6  # Minimum learning rate (for cosine scheduler)


# TianShou PPO parameters
buffer_size: 20000
max_epoch: 100
step_per_epoch: 32000
repeat_per_collect: 2  # Reduced to prevent overfitting
episode_per_test: 10
batch_size: 128  # Increased from 64 for more stable gradients
step_per_collect: 6400

# Feature Extractor parameters
embedding_dim: 32
numerical_feat_dim: 7
numerical_hidden_dim: 32

# GNN Encoder parameters
gnn_hidden_dims: [256, 256]
gnn_output_dim: 256
gnn_num_layers: 3
gnn_dropout: 0.1

# Actor parameters
actor_hidden_dim: 256
actor_dropout: 0.1

# Critic parameters
value_hidden_dim: 256
value_num_layers: 2
value_pooling_type: "mean" # Options: "mean", "max", "sum", "attention"
value_dropout: 0.1

# Policy parameters
discount_factor: 0.99
gae_lambda: 0.95
vf_coef: 0.5
ent_coef: 0.2  # Higher entropy to prevent policy collapse
max_grad_norm: 0.5
value_clip: True
advantage_normalization: True
recompute_advantage: True  # Changed to True for better advantage estimates
dual_clip: null
reward_normalization: False  # Disabled to preserve reward signal
eps_clip: 0.05  # Smaller policy updates to prevent collapse
max_batchsize: 256
deterministic_eval: True